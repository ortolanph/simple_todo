apiVersion: v1
kind: Namespace
metadata:
  name: simple-todos-ns
  labels:
    name: simple-todos-ns

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-todos-deployment
  namespace: simple-todos-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-todos-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: simple-todos-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: simple-todos-app
          image: simple_todos:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /todos
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /todos
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: simple-todos-web-service
  namespace: simple-todos-ns
spec:
  selector:
    app: simple-todos-app
  ports:
    - port: 80
      targetPort: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-todos-ingress
  namespace: simple-todos-ns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /todos
            pathType: Prefix
            backend:
              service:
                name: simple-todos-web-service
                port:
                  number: 80
